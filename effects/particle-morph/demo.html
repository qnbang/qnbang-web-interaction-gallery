<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Particle Morph — demo</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: radial-gradient(80% 80% at 50% 60%, #2a2f6e 0%, #131349 60%, #0a0a1a 100%); display: grid; place-items: center; font: 13px/1.5 system-ui, sans-serif; }
  #stage { position: relative; width: 100vw; height: 100vh; }
  /* 링 중앙에 드러나는 문의 버튼(placeholder) */
  #cta-wrap { position: absolute; inset: 0; display: grid; place-items: center; z-index: 2; opacity: 0; transition: opacity .4s ease; pointer-events: none; }
  #cta-wrap.on { opacity: 1; }
  #cta { width: 150px; height: 150px; border-radius: 999px; border: 1.5px solid #cdd4ff; color: #eaeeff; background: transparent; display: grid; place-items: center; font-size: 14px; }
  .hint { position: fixed; top: 22px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.85); z-index: 3; }
  .hint b { color: #fff; }
</style>
</head>
<body>
  <div id="stage">
    <div id="cta-wrap"><div id="cta">프로젝트 문의</div></div>
  </div>
  <div class="hint"><b>중앙으로 커서</b>를 가져가면 점구름 구가 링으로 모핑되고 중앙에 버튼이 드러납니다.</div>

  <script type="importmap">
    { "imports": { "three": "../../shared/vendor/three.module.min.js" } }
  </script>
  <script type="module">
    import { ParticleMorph } from './particle-morph.js';
    const wrap = document.getElementById('cta-wrap');
    const morph = new ParticleMorph('#stage', { count: 50000 /* , modelUrl: '/models/blueberry.glb' */ });
    // 활성(링) 상태 → 중앙 버튼 토글 (원본의 footerberry:active 대체)
    morph.onActiveChange = (on) => wrap.classList.toggle('on', on);
  </script>
</body>
</html>
