<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scattered Cards 3D — demo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: linear-gradient(160deg, #A8B5E5 0%, #4545DA 45%, #131349 100%); font: 13px/1.5 system-ui, sans-serif; }
  #stage { position: fixed; inset: 0; z-index: 0; }
  .spacer { height: 500vh; position: relative; z-index: 1; pointer-events: none; }
  .hint { position: fixed; top: 22px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,.85); z-index: 2; }
  .hint b { color: #fff; }
</style>
</head>
<body>
  <div id="stage"></div>
  <div class="spacer"></div>
  <div class="hint"><b>스크롤</b>하면 카드들이 텀블링하며 위로 흐르고, 마지막에 클라이맥스 카드가 정면으로 지나갑니다.</div>

  <script type="importmap">
    { "imports": { "three": "../../shared/vendor/three.module.min.js" } }
  </script>
  <script type="module">
    import { ScatteredCards3D } from './scattered-cards-3d.js';
    const cards = new ScatteredCards3D('#stage', {
      count: 19,
      frontImage: './assets/card-front.jpg',
      backImages: ['./assets/card-back.jpg'],
    });
    const onScroll = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      cards.setProgress(max > 0 ? window.scrollY / max : 0);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  </script>
</body>
</html>
